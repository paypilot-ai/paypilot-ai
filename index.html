<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PayPilot AI</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef4ff;
}

/* HERO HEADER */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px;
margin:20px;
border-radius:18px;
background:linear-gradient(135deg,#1e3a8a,#2563eb,#60a5fa);
color:white;
}

.hero h1{
margin:0;
font-size:30px;
}

.hero-sub{
font-size:13px;
opacity:.8;
}

.live{
background:#22c55e;
width:10px;
height:10px;
border-radius:50%;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* SEARCH */
.result{
padding:10px;
border-top:1px solid #eee;
cursor:pointer;
}
.result:hover{
background:#eef4ff;
}

/* AI BOX */
.ai-box{
font-size:30px;
text-align:center;
font-weight:bold;
padding:40px;
border-radius:20px;
background:linear-gradient(135deg,#fff,#f0f6ff);
box-shadow:0 20px 50px rgba(0,0,0,.1);
}

/* STATS */
.stats{
display:flex;
gap:10px;
}
.stat{
flex:1;
background:white;
padding:15px;
border-radius:12px;
text-align:center;
}
</style>
</head>

<body>

<div id="login" class="container">
<div class="card">
<h2>Login</h2>
<input id="pass">
<button onclick="login()">Login</button>
</div>
</div>

<div id="app" style="display:none">

<div class="hero">
<div>
<h1>PayPilot AI</h1>
<div class="hero-sub">High visibility live call assistant</div>
</div>
<div style="display:flex;align-items:center;gap:8px;">
<div class="live"></div>
LIVE
</div>
</div>

<div class="container">

<div class="stats">
<div class="stat">Calls<br><span id="calls">0</span></div>
<div class="stat">Converted<br><span id="converted">0</span></div>
<div class="stat">Rate<br><span id="rate">0%</span></div>
</div>

<div class="card">
<h3>Search Company</h3>
<input id="search" oninput="searchCompany()">
<div id="results"></div>

<p><strong>Selected:</strong> <span id="selected">None</span></p>
</div>

<div class="card">
<textarea id="input" placeholder="What did supplier say..."></textarea>
<button onclick="generate()">Generate</button>
</div>

<div class="ai-box" id="response">—</div>

<div class="card">
<select id="outcome">
<option>Pending</option>
<option>Converted</option>
</select>
<button onclick="logCall()">Log Call</button>
</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

</div>
</div>

<script>

let suppliers = [
"Novacore",
"Atlas",
"Blue Ridge",
"Kingstone"
];

let history = [];

function login(){
if(document.getElementById("pass").value === "demo123"){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
}
}

function searchCompany(){
let q = document.getElementById("search").value.toLowerCase();
let results = document.getElementById("results");

results.innerHTML = suppliers
.filter(s => s.toLowerCase().includes(q))
.map(s => `<div class="result" onclick="select('${s}')">${s}</div>`)
.join("");
}

function select(name){
document.getElementById("selected").innerText = name;
}

function typeText(text){
let i = 0;
let el = document.getElementById("response");
el.innerText = "";

let interval = setInterval(()=>{
el.innerText += text[i];
i++;
if(i >= text.length) clearInterval(interval);
}, 20);
}

function generate(){
let text = document.getElementById("input").value.toLowerCase();

let response = "ACH gets you paid faster.";

if(text.includes("check")){
response = "Most people start with checks, but ACH usually makes life easier since you’re not waiting anymore.";
}

if(text.includes("fee")){
response = "That’s fair. That’s why ACH is better since it avoids fees and keeps it simple.";
}

typeText(response);
}

function logCall(){
let outcome = document.getElementById("outcome").value;

history.unshift(outcome);

document.getElementById("calls").innerText = history.length;

let converted = history.filter(x=>x==="Converted").length;
document.getElementById("converted").innerText = converted;

let rate = Math.round((converted/history.length)*100)||0;
document.getElementById("rate").innerText = rate+"%";

document.getElementById("history").innerHTML =
history.map(h=>`<div>${h}</div>`).join("");
}

</script>

</body>
</html>
