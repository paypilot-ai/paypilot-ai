<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayPilot AI</title>

<style>
body { font-family: Arial; background:#f3f4f6; margin:0; padding:20px; }
.box { background:white; padding:20px; border-radius:10px; margin-bottom:15px; }
input, textarea, select { width:100%; padding:10px; margin-top:8px; }
button { padding:12px; background:black; color:white; border:none; border-radius:6px; }
.hidden { display:none; }
</style>
</head>

<body>

<h2>PayPilot AI</h2>

<div class="box" id="login">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<br><br>
<button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">

<div class="box">
<h3>Supplier</h3>
Novacore Electrical<br>
Anthony King
</div>

<div class="box">
<h3>Supplier Objection</h3>
<textarea id="objection"></textarea>
<button onclick="ai()">Generate Response</button>
<p id="response"></p>
</div>

<div class="box">
<h3>Outcome</h3>
<select id="outcome">
<option>Pending</option>
<option>Follow Up Needed</option>
<option>Converted</option>
<option>Rejected</option>
</select>
<button onclick="log()">Log Call</button>
</div>

<div class="box">
<h3>Call History</h3>
<div id="history"></div>
</div>

</div>

<script>

function login(){
let email=document.getElementById("email").value
let pass=document.getElementById("password").value

if(email==="demo@paypilot.ai" && pass==="demo123"){
document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"
}else{
alert("Wrong login")
}
}

function ai(){
let text=document.getElementById("objection").value.toLowerCase()

let response="ACH speeds up payments and removes delays."

if(text.includes("check")){
response="ACH removes check delays and gets you paid faster."
}
if(text.includes("fee")){
response="ACH avoids card fees and is the easiest option."
}

document.getElementById("response").innerText=response
}

function log(){
let outcome=document.getElementById("outcome").value
let objection=document.getElementById("objection").value

let div=document.createElement("div")
div.innerHTML="<b>Objection:</b> "+objection+"<br><b>Outcome:</b> "+outcome+"<hr>"

document.getElementById("history").appendChild(div)
}

</script>

</body>
</html>
