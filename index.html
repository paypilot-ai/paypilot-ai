<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PayPilot AI</title>

<style>
:root{
--primary:#0066CC;
--bg:#f4f7fb;
--card:#ffffff;
--text:#1f2937;
--muted:#6b7280;
--border:#e5e7eb;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--bg);
}

.wrap{max-width:1100px;margin:auto;padding:20px}

.header{
background:var(--primary);
color:white;
padding:20px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:20px;
font-weight:bold;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:10px;
padding:18px;
margin-top:15px;
}

.grid{display:grid;gap:12px}
.grid-3{grid-template-columns:1fr 1fr 1fr}

input,textarea,select{
width:100%;
padding:12px;
border:1px solid var(--border);
border-radius:8px;
margin-bottom:10px;
}

button{
background:var(--primary);
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
}

.hidden{display:none}

.stat{
padding:12px;
border:1px solid var(--border);
border-radius:8px;
}

.small{font-size:12px;color:var(--muted)}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<div class="logo">⚡ PayPilot AI</div>
<div id="userDisplay"></div>
</div>

<div id="loginCard" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">

<div class="grid grid-3">

<div class="stat">Calls: <span id="calls">0</span></div>
<div class="stat">Converted: <span id="converted">0</span></div>
<div class="stat">Rate: <span id="rate">0%</span></div>

</div>

<div class="card">
<h3>Supplier</h3>
<select id="supplierSelect" onchange="loadSupplier()"></select>
<div id="supplierInfo"></div>
</div>

<div class="card">
<h3>Live Call</h3>
<textarea id="objection"></textarea>
<button onclick="generateResponse()">Generate AI Response</button>
<p id="response">—</p>
</div>

<div class="card">
<h3>Outcome</h3>
<select id="outcome">
<option>Pending</option>
<option>Converted</option>
<option>Rejected</option>
</select>
<button onclick="logCall()">Log Call</button>
</div>

<div class="card">
<h3>CRM Note</h3>
<p id="crm"></p>
</div>

<div class="card">
<h3>Follow-up Email</h3>
<p id="emailText"></p>
</div>

<div class="card">
<h3>Call History</h3>
<div id="history"></div>
</div>

</div>

</div>

<script>

const API_KEY="
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
";

let history=[];

const suppliers=[
{company:"Novacore Electrical",contact:"Anthony"},
{company:"Atlas Industrial",contact:"Jorge"},
{company:"Blue Ridge",contact:"Trista"}
];

function login(){
let e=email.value;
let p=password.value;

if((e==="demo@paypilot.ai"||e==="manager@paypilot.ai")&&p==="demo123"){
loginCard.classList.add("hidden");
app.classList.remove("hidden");
userDisplay.innerText=e;
loadSuppliers();
}else alert("Wrong login");
}

function loadSuppliers(){
supplierSelect.innerHTML=suppliers.map((s,i)=>`<option value=${i}>${s.company}</option>`);
loadSupplier();
}

function loadSupplier(){
let s=suppliers[supplierSelect.value||0];
supplierInfo.innerHTML=`Contact: ${s.contact}`;
}

async function generateResponse(){
let text=objection.value;

response.innerText="Thinking...";

try{
let r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"You are a high level closer. Short, confident, persuasive."},
{role:"user",content:text}
]
})
});

let d=await r.json();
response.innerText=d.choices[0].message.content;

}catch{
response.innerText="ACH speeds up payment and removes delays.";
}

crm.innerText="Discussed ACH with supplier.";
emailText.innerText="Following up on electronic payment setup.";
}

function logCall(){
let outcomeVal=outcome.value;

history.unshift({
text:objection.value,
outcome:outcomeVal
});

renderHistory();
updateStats();
}

function renderHistory(){
historyDiv.innerHTML=history.map(h=>`<p>${h.text} - ${h.outcome}</p>`).join("");
}

function updateStats(){
let total=history.length;
let conv=history.filter(h=>h.outcome==="Converted").length;

calls.innerText=total;
converted.innerText=conv;
rate.innerText= total? Math.round(conv/total*100)+"%":"0%";
}

</script>

</body>
</html>
