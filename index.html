<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PayPilot AI</title>

<style>
:root{
--bg:#0a0f1c;
--card:#111827;
--line:#1f2937;
--text:#f9fafb;
--muted:#9ca3af;
--blue:#3b82f6;
--green:#22c55e;
--red:#ef4444;
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#020617,#0f172a);
color:var(--text);
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:14px;
padding:18px;
margin-bottom:16px;
}

h1,h3{margin:0 0 10px}

input,textarea,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:12px;
border-radius:10px;
border:1px solid var(--line);
background:#020617;
color:white;
}

button{
background:var(--blue);
color:white;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
}

button.secondary{
background:#1f2937;
}

.hidden{display:none}

.stat{
padding:12px;
border:1px solid var(--line);
border-radius:10px;
margin-bottom:10px;
}

.small{
color:var(--muted);
font-size:12px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
<h1>PayPilot AI</h1>
<p class="small">Real-time supplier call assistant</p>
</div>

<div id="loginCard" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p class="small">demo@paypilot.ai / demo123</p>
</div>

<div id="app" class="hidden">

<div class="card">
<h3>Command Center</h3>
<p id="welcome"></p>
<button class="secondary" onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Supplier</h3>
<select id="supplierSelect" onchange="loadSupplier()"></select>
<div id="supplierInfo"></div>
</div>

<div class="card">
<h3>Objection</h3>
<textarea id="objection" placeholder="Type what supplier says..."></textarea>
<button onclick="generateResponse()">Generate Response</button>
<p id="response">—</p>
</div>

<div class="card">
<h3>Performance</h3>
<div class="stat">Confidence: <span id="confidence">—</span></div>
<div class="stat">Close Probability: <span id="probability">—</span></div>
</div>

</div>

</div>

<script>

const OPENAI_API_KEY = "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";

const suppliers = [
{company:"Novacore Electrical", contact:"Anthony King"},
{company:"Atlas Industrial Supply", contact:"Jorge Ramirez"},
{company:"Blue Ridge Property", contact:"Trista Jamieson"}
];

function login(){
const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value.trim();

if((email === "demo@paypilot.ai" || email === "manager@paypilot.ai") && password === "demo123"){
document.getElementById("loginCard").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("welcome").textContent = "Logged in as " + email;
populateSuppliers();
loadSupplier();
} else {
alert("Wrong login");
}
}

function logout(){
location.reload();
}

function populateSuppliers(){
const select = document.getElementById("supplierSelect");
select.innerHTML = suppliers.map((s,i)=>
`<option value="${i}">${s.company}</option>`
).join("");
}

function loadSupplier(){
const s = suppliers[document.getElementById("supplierSelect").value || 0];
document.getElementById("supplierInfo").innerHTML = `
<p><strong>Contact:</strong> ${s.contact}</p>
`;
}

function calcProbability(text){
let score = 70;
text = text.toLowerCase();

if(text.includes("check")) score -= 10;
if(text.includes("fee")) score -= 15;
if(text.includes("busy")) score -= 5;
if(text.includes("yes")) score += 20;

return Math.max(5, Math.min(95, score));
}

async function generateResponse(){
const text = document.getElementById("objection").value.trim();
document.getElementById("response").textContent = "Thinking...";

let response = "";

try{
const res = await fetch("https://api.openai.com/v1/chat/completions", {
method:"POST",
headers:{
"Authorization":"Bearer " + OPENAI_API_KEY,
"Content-Type":"application/json"
},
body: JSON.stringify({
model:"gpt-4o-mini",
messages:[
{
role:"system",
content:"You are a high level sales closer. Keep responses short, confident, and persuasive."
},
{
role:"user",
content:text
}
]
})
});

const data = await res.json();
response = data.choices?.[0]?.message?.content || "No response";

} catch {
response = "ACH helps you get paid faster and removes delays from checks.";
}

document.getElementById("response").textContent = response;
document.getElementById("confidence").textContent = "90%";
document.getElementById("probability").textContent = calcProbability(text) + "%";
}

</script>

</body>
</html>
