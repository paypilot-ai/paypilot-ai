<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PayPilot AI</title>

<style>
body{font-family:Arial;background:#eef4ff;margin:0;padding:20px}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:15px;box-shadow:0 10px 30px rgba(0,0,0,.1)}
input,textarea,select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ddd}
button{padding:12px;margin-top:10px;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer}
.result{padding:10px;border-top:1px solid #eee;cursor:pointer}
.result:hover{background:#eef4ff}
.ai{font-size:26px;text-align:center;padding:30px;font-weight:bold}
.stat{display:inline-block;margin-right:20px}
</style>

</head>
<body>

<div class="card">

<h2>PayPilot AI</h2>

<!-- SEARCH -->
<input id="search" oninput="searchCompany()" placeholder="Search company, contact...">
<div id="results"></div>

<p><strong>Company:</strong> <span id="selectedCompany">None</span></p>
<p><strong>Contact:</strong> <span id="selectedContact">—</span></p>

<!-- MODE -->
<label>Response Style</label>
<select id="responseMode">
<option value="smooth">Smooth</option>
<option value="closer" selected>Closer</option>
</select>

<!-- INPUT -->
<textarea id="input" placeholder="Type or use mic..."></textarea>

<button onclick="generate()">Generate Response</button>

<!-- MIC -->
<button onclick="startMic()">🎤 Capture Voice</button>

<!-- OUTPUT -->
<div class="ai" id="response">—</div>

<p id="score"></p>
<p id="strategy"></p>

<!-- CRM -->
<h3>CRM Note</h3>
<p id="crm"></p>

<h3>Follow-up Email</h3>
<p id="email"></p>

<!-- STATS -->
<div>
<span class="stat">Calls: <span id="calls">0</span></span>
<span class="stat">Converted: <span id="converted">0</span></span>
<span class="stat">Rate: <span id="rate">0%</span></span>
</div>

<button onclick="logCall()">Log Call</button>

<h3>History</h3>
<div id="history"></div>

</div>

<script>

// DATA
let suppliers=[
{company:"Novacore Electrical",contact:"Anthony King"},
{company:"Atlas Industrial Supply",contact:"Jorge Ramirez"},
{company:"Blue Ridge Property",contact:"Trista Jamieson"},
{company:"Keystone Facility Group",contact:"Mark Ellis"},
{company:"Kingstone Mechanical",contact:"Lisa Warren"},
{company:"KLM Property Services",contact:"Derrick Cole"}
];

let selectedSupplier=null;
let historyLog=[];

// SEARCH
function searchCompany(){
let q=document.getElementById("search").value.toLowerCase();

let matches=suppliers.filter(s=>
s.company.toLowerCase().includes(q)||
s.contact.toLowerCase().includes(q)
);

document.getElementById("results").innerHTML=
matches.map(s=>`
<div class="result" onclick="selectSupplier('${s.company}')">
<strong>${s.company}</strong><br>
<span style="font-size:12px">${s.contact}</span>
</div>
`).join("");
}

// SELECT
function selectSupplier(name){
selectedSupplier=suppliers.find(s=>s.company===name);

document.getElementById("selectedCompany").innerText=selectedSupplier.company;
document.getElementById("selectedContact").innerText=selectedSupplier.contact;

document.getElementById("search").value=name;
document.getElementById("results").innerHTML="";
}

// RESPONSE ENGINE (YOUR STYLE)
function buildDemoResponse(text){
const t=text.toLowerCase();
const mode=document.getElementById("responseMode").value;

// CLOSER MODE
if(mode==="closer"){
if(t.includes("check")) return "Let’s just get you off checks so you get paid faster.";
if(t.includes("fee")) return "That’s exactly why ACH makes more sense here.";
if(t.includes("busy")) return "This takes less time to handle now than later.";
if(t.includes("accountant")) return "Send it to them, this usually gets approved quickly.";
return "Let’s keep it simple — this is just a faster way to get paid.";
}

// SMOOTH MODE
if(t.includes("check")) return "Most people start there, but ACH is faster and easier.";
if(t.includes("fee")) return "ACH avoids the fee issue completely.";
if(t.includes("busy")) return "I’ll keep it quick — this saves you time.";
if(t.includes("accountant")) return "Usually once they see it, it’s an easy decision.";
return "This just makes payments easier and faster.";
}

// SCORING
function scoreCall(text){
let score=70;
let t=text.toLowerCase();

if(t.includes("check")) score-=5;
if(t.includes("fee")) score-=10;
if(t.includes("not interested")) score-=20;
if(t.includes("yes")) score+=15;

return Math.max(10,Math.min(95,score));
}

// GENERATE
function generate(){
let text=document.getElementById("input").value;

let response=buildDemoResponse(text);
let score=scoreCall(text);

document.getElementById("response").innerText=response;
document.getElementById("score").innerText="Close Probability: "+score+"%";

let strategy="Guide forward";
if(score>80) strategy="Close now";
if(score<50) strategy="Reframe";

document.getElementById("strategy").innerText="Strategy: "+strategy;

// CRM + EMAIL
if(selectedSupplier){
document.getElementById("crm").innerText=
`${selectedSupplier.company}: Discussed payment options with ${selectedSupplier.contact}.`;

document.getElementById("email").innerText=
`Hi ${selectedSupplier.contact}, following up on our conversation. ACH may be a faster option for your payments.`;
}
}

// LOG CALL
function logCall(){
let text=document.getElementById("input").value;

historyLog.unshift(text);

document.getElementById("history").innerHTML=
historyLog.map(h=>`<div>${h}</div>`).join("");

// stats
let calls=historyLog.length;
let converted=historyLog.filter(x=>x.includes("yes")).length;
let rate=Math.round((converted/calls)*100)||0;

document.getElementById("calls").innerText=calls;
document.getElementById("converted").innerText=converted;
document.getElementById("rate").innerText=rate+"%";
}

// MIC (SAFE VERSION)
function startMic(){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

if(!SR){
alert("Mic not supported");
return;
}

let rec=new SR();
rec.continuous=false;
rec.interimResults=false;

rec.onresult=(e)=>{
let text=e.results[0][0].transcript;
document.getElementById("input").value=text;
};

rec.start();
}

</script>

</body>
</html>
