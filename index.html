<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PayPilot AI</title>

<style>
body{margin:0;font-family:Arial;background:#eef4ff}

/* HERO */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px;
margin:20px;
border-radius:18px;
background:linear-gradient(135deg,#1e3a8a,#2563eb,#60a5fa);
color:white;
}
.hero h1{margin:0;font-size:32px}
.live{width:10px;height:10px;background:#22c55e;border-radius:50%;animation:pulse 1.2s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}

.container{max-width:1100px;margin:auto;padding:20px}

.card{
background:white;
padding:20px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

/* STATS */
.stats{display:flex;gap:10px}
.stat{flex:1;background:white;padding:15px;border-radius:12px;text-align:center}

/* INPUTS */
input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* BUTTON */
button{
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* SEARCH */
.result{
padding:10px;
border-top:1px solid #eee;
cursor:pointer;
}
.result:hover{background:#eef4ff}

/* AI */
.ai-box{
font-size:30px;
text-align:center;
font-weight:bold;
padding:40px;
border-radius:20px;
background:linear-gradient(135deg,#fff,#f0f6ff);
box-shadow:0 20px 50px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<div id="login" class="container">
<div class="card">
<h2>Login</h2>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="app" style="display:none">

<div class="hero">
<div>
<h1>PayPilot AI</h1>
<div>Live Call Assistant</div>
</div>
<div style="display:flex;gap:8px;align-items:center;">
<div class="live"></div>LIVE
</div>
</div>

<div class="container">

<div class="stats">
<div class="stat">Calls<br><span id="calls">0</span></div>
<div class="stat">Converted<br><span id="converted">0</span></div>
<div class="stat">Rate<br><span id="rate">0%</span></div>
</div>

<div class="card">
<h3>Company Search</h3>
<input id="search" oninput="searchCompany()" placeholder="Search company, contact, email, phone">

<div id="results"></div>

<div style="margin-top:10px;">
<p><strong>Company:</strong> <span id="selectedCompany">None</span></p>
<p><strong>Contact:</strong> <span id="selectedContact">—</span></p>
<p><strong>Email:</strong> <span id="selectedEmail">—</span></p>
<p><strong>Phone:</strong> <span id="selectedPhone">—</span></p>
</div>
</div>

<div class="card">
<h3>Supplier Objection</h3>
<textarea id="input" placeholder="Type what they say..."></textarea>
<button onclick="generate()">Generate AI Response</button>
</div>

<div class="ai-box" id="response">—</div>
<div class="card">
<select id="outcome">
<option>Pending</option>
<option>Converted</option>
<option>Rejected</option>
</select>
<button onclick="logCall()">Log Call</button>
</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

</div>
</div>

<script>

let suppliers = [
{ company:"Novacore Electrical", contact:"Anthony King", email:"aking@novacore.com", phone:"7045551122" },
{ company:"Atlas Industrial", contact:"Jorge Ramirez", email:"jramirez@atlas.com", phone:"9805552222" },
{ company:"Blue Ridge Property", contact:"Trista Jamieson", email:"tjamieson@ridge.com", phone:"8285553333" },
{ company:"Keystone Group", contact:"Mark Ellis", email:"mellis@keystone.com", phone:"7045554444" }
];

let history = [];
let selectedSupplier = null;

function login(){
if(document.getElementById("pass").value==="demo123"){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
}
}

/* SEARCH */
function searchCompany(){
let q=document.getElementById("search").value.toLowerCase();

let matches = suppliers.filter(s =>
s.company.toLowerCase().includes(q) ||
s.contact.toLowerCase().includes(q) ||
s.email.toLowerCase().includes(q) ||
s.phone.includes(q)
);

document.getElementById("results").innerHTML =
matches.map((s,i)=>`
<div class="result" onclick="selectSupplier(${i})">
<strong>${s.company}</strong><br>
<span style="font-size:12px;color:#666;">
${s.contact} • ${s.email} • ${s.phone}
</span>
</div>
`).join("");
}

function selectSupplier(index){
selectedSupplier = suppliers[index];

document.getElementById("selectedCompany").innerText = selectedSupplier.company;
document.getElementById("selectedContact").innerText = selectedSupplier.contact;
document.getElementById("selectedEmail").innerText = selectedSupplier.email;
document.getElementById("selectedPhone").innerText = selectedSupplier.phone;
document.getElementById("search").value = selectedSupplier.company;
document.getElementById("results").innerHTML = "";
}

/* AI */
function type(text){
let i=0;
let el=document.getElementById("response");
el.innerText="";
let t=setInterval(()=>{
el.innerText+=text[i];
i++;
if(i>=text.length)clearInterval(t);
},20);
}

function generate(){
let text=document.getElementById("input").value.toLowerCase();

let r="ACH gets you paid faster.";

if(text.includes("check")){
r="Most suppliers start with checks, but ACH removes delays and speeds everything up.";
}
if(text.includes("fee")){
r="That’s fair. ACH avoids extra fees and keeps things simple.";
}
if(text.includes("busy")){
r="No problem. I’ll keep this quick so you don’t revisit it.";
}

type(r);
}

/* LOGGING */
function logCall(){
let outcome=document.getElementById("outcome").value;

history.unshift(outcome);

let calls=history.length;
let converted=history.filter(x=>x==="Converted").length;
let rate=Math.round((converted/calls)*100)||0;

document.getElementById("calls").innerText=calls;
document.getElementById("converted").innerText=converted;
document.getElementById("rate").innerText=rate+"%";

document.getElementById("history").innerHTML=
history.map(h=>`<div>${h}</div>`).join("");
}

</script>

</body>
</html>
