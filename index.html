<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PayPilot AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

:root{
–bg:#f1f4f9;
–bg2:#e8ecf5;
–white:#ffffff;
–sidebar:#0f1c2e;
–sidebar-hover:rgba(255,255,255,.08);
–sidebar-active:rgba(59,130,246,.25);
–blue:#2563eb;
–blue-light:#eff6ff;
–blue-mid:#3b82f6;
–blue-dark:#1d4ed8;
–gold:#f59e0b;
–gold-light:#fffbeb;
–green:#059669;
–green-light:#ecfdf5;
–red:#dc2626;
–red-light:#fef2f2;
–amber:#d97706;
–cyan:#0891b2;
–text:#0f172a;
–text2:#374151;
–text3:#6b7280;
–text4:#9ca3af;
–border:#d1d5db;
–border2:#e5e7eb;
–shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
–shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
–shadow-lg:0 10px 25px rgba(0,0,0,.1),0 4px 10px rgba(0,0,0,.06);
–shadow-xl:0 25px 50px rgba(0,0,0,.12);
–r:14px;
–r-sm:10px;
}

body{
font-family:‘Inter’,sans-serif;
background:var(–bg);
color:var(–text);
min-height:100vh;
font-size:15px;
line-height:1.6;
-webkit-font-smoothing:antialiased;
}

/* ═══════════ LOGIN PAGE ═══════════ */
#loginPage{
min-height:100vh;
display:grid;
grid-template-columns:1fr 1fr;
}

/* LEFT — bold blue brand panel */
.lp-left{
background:linear-gradient(145deg,#1e40af 0%,#2563eb 50%,#1d4ed8 100%);
padding:60px 64px;
display:flex;
flex-direction:column;
justify-content:center;
position:relative;
overflow:hidden;
}

.lp-left::before{
content:’’;
position:absolute;inset:0;
background:
radial-gradient(ellipse 80% 60% at 20% 20%,rgba(255,255,255,.12) 0%,transparent 60%),
radial-gradient(ellipse 60% 50% at 80% 80%,rgba(0,0,0,.2) 0%,transparent 60%);
pointer-events:none;
}

/* Decorative circles */
.lp-left::after{
content:’’;
position:absolute;
width:500px;height:500px;
border-radius:50%;
border:1px solid rgba(255,255,255,.1);
top:-150px;right:-150px;
pointer-events:none;
}

.lp-deco-ring{
position:absolute;
width:300px;height:300px;
border-radius:50%;
border:1px solid rgba(255,255,255,.08);
bottom:-80px;left:-80px;
}

.lp-logo{
display:flex;align-items:center;gap:14px;
margin-bottom:56px;
position:relative;z-index:1;
}

.lp-logo-icon{
width:52px;height:52px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.3);
border-radius:14px;
display:flex;align-items:center;justify-content:center;
flex-shrink:0;
}

.lp-logo-svg{width:30px;height:30px;}

.lp-logo-name{
font-size:22px;font-weight:800;
color:#ffffff;letter-spacing:-.02em;
}

.lp-logo-name span{color:rgba(186,230,253,1);}

.lp-headline{
font-size:60px;font-weight:900;
color:#ffffff;
line-height:1.0;
letter-spacing:-.04em;
margin-bottom:22px;
position:relative;z-index:1;
}

.lp-headline span{
color:#bfdbfe;
display:block;
}

.lp-tagline{
font-family:‘Instrument Serif’,serif;
font-size:20px;font-style:italic;
color:rgba(219,234,254,.9);
margin-bottom:48px;
position:relative;z-index:1;
line-height:1.55;
max-width:400px;
}

.lp-features{
display:flex;flex-direction:column;gap:14px;
position:relative;z-index:1;
}

.lp-feat{
display:flex;align-items:center;gap:14px;
background:rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.18);
border-radius:12px;
padding:14px 18px;
backdrop-filter:blur(8px);
}

.lp-feat-icon{
font-size:22px;flex-shrink:0;
width:40px;text-align:center;
}

.lp-feat-text{
font-size:16px;font-weight:600;
color:#ffffff;
}

.lp-feat-sub{
font-size:13px;color:rgba(191,219,254,.8);
margin-top:1px;
}

/* RIGHT — clean white form panel */
.lp-right{
background:#ffffff;
padding:60px 72px;
display:flex;
flex-direction:column;
justify-content:center;
}

.lp-form-eyebrow{
font-size:12px;font-weight:700;
letter-spacing:.12em;text-transform:uppercase;
color:var(–blue);margin-bottom:16px;
}

.lp-form-title{
font-size:42px;font-weight:900;
color:#0f172a;letter-spacing:-.04em;
line-height:1.1;margin-bottom:10px;
}

.lp-form-sub{
font-size:17px;color:#6b7280;
margin-bottom:40px;line-height:1.5;
}

.lp-field-label{
display:block;
font-size:14px;font-weight:700;
color:#374151;margin-bottom:8px;
letter-spacing:.01em;
}

.lp-input{
width:100%;
padding:16px 18px;
font-size:17px;font-family:‘Inter’,sans-serif;
border:2px solid #e5e7eb;
border-radius:12px;
outline:none;
color:#0f172a;
background:#f9fafb;
transition:all .18s;
margin-bottom:20px;
}

.lp-input:focus{
border-color:var(–blue);
background:#fff;
box-shadow:0 0 0 4px rgba(37,99,235,.1);
}

.lp-input::placeholder{color:#9ca3af;}

.lp-btn{
width:100%;
padding:18px;
font-size:18px;font-weight:800;
font-family:‘Inter’,sans-serif;
border:none;border-radius:12px;
background:linear-gradient(135deg,#1d4ed8,#3b82f6);
color:#fff;cursor:pointer;
